<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelShield</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 0;
      color: #1e293b;
    }

    header {
      background-color: #2563eb;
      color: white;
      padding: 1rem 2rem;
      text-align: center;
    }

    main {
      max-width: 700px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    section {
      margin-bottom: 2rem;
    }

    input, select, button {
      display: block;
      width: 100%;
      margin: 0.5rem 0;
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
    }

    button {
      background-color: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #1e40af;
    }

    .stats-box, .history-box {
      background: #f1f5f9;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h2>ReelShield</h2>
  </header>

  <main>

    <!-- Section: Log Form -->
    <section id="log-form">
      <h3>Add Time Entry</h3>
      <form>
        <label for="platform">Platform</label>
        <select id="platform">
          <option value="">Select Platform</option>
          <option value="youtube">YouTube Shorts</option>
          <option value="tiktok">TikTok</option>
          <option value="instagram">Instagram Reels</option>
          <option value="facebook">Facebook Reels</option>
          <option value="other">Other</option>
        </select>

        <label for="duration">Minutes Spent</label>
        <input type="number" id="duration" placeholder="e.g. 15" min="1">

        <button type="button">Add Entry</button>
      </form>
    </section>


  </main>

  <footer>
  </footer>

</body>
</html>
